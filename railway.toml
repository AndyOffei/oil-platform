[build]
builder         = "NIXPACKS"
buildCommand    = "cd server && npm install && cp prisma/schema.prod.prisma prisma/schema.prisma && npx prisma generate && npx prisma migrate deploy"

[deploy]
startCommand    = "cd server && node index.js"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production.variables]
NODE_ENV = "production"
PORT     = "4000"

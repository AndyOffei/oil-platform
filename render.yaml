services:
  - type: web
    name: oilintel-api
    runtime: node
    region: oregon
    rootDir: server
    buildCommand: >
      npm install &&
      cp prisma/schema.prod.prisma prisma/schema.prisma &&
      npx prisma generate &&
      npx prisma db push --accept-data-loss &&
      node prisma/seed.js
    startCommand: node index.js
    healthCheckPath: /api/health
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: oilintel-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://oil-platform.vercel.app
      - key: AI_API_KEY
        generateValue: true

databases:
  - name: oilintel-db
    databaseName: oilintel
    user: oilintel
    region: oregon
    plan: starter
